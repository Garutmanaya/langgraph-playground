services:
  agentv24:
    build: .
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-langgraph-playground}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      HOST: 0.0.0.0
      PORT: 8501
